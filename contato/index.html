<!DOCTYPE html>
<html lang="en-US" dir="ltr">

<head>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-subids async defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us – Smart Select</title>
    <style>
        :root {
            --wp--preset--color--black: #000000;
            --wp--preset--color--white: #ffffff;
            --wp--preset--color--base: #f9f9f9;
            --wp--preset--color--base-2: #ffffff;
            --wp--preset--color--contrast: #111111;
            --wp--preset--color--contrast-2: #636363;
            --wp--preset--color--contrast-3: #A4A4A4;
            --wp--preset--font-size--small: 0.9rem;
            --wp--preset--font-size--medium: 1.05rem;
            --wp--preset--font-size--large: clamp(1.39rem, 1.39rem + ((1vw - 0.2rem) * 0.767), 1.85rem);
            --wp--preset--font-size--x-large: clamp(1.85rem, 1.85rem + ((1vw - 0.2rem) * 1.083), 2.5rem);
            --wp--preset--font-size--xx-large: clamp(2.5rem, 2.5rem + ((1vw - 0.2rem) * 1.283), 3.27rem);
            --wp--preset--font-family--body: "Inter", sans-serif;
            --wp--preset--font-family--system-sans-serif: -apple-system, BlinkMacSystemFont, avenir next, avenir, segoe ui, helvetica neue, helvetica, Cantarell, Ubuntu, roboto, noto, arial, sans-serif;
            --wp--preset--spacing--20: min(1.5rem, 2vw);
            --wp--preset--spacing--30: min(2.5rem, 3vw);
            --wp--preset--spacing--40: min(4rem, 5vw);
            --wp--preset--spacing--50: min(6.5rem, 8vw);
            --wp--style--global--content-size: 620px;
            --wp--style--global--wide-size: 1280px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background-color: #ffffff;
            color: var(--wp--preset--color--contrast);
            font-family: var(--wp--preset--font-family--system-sans-serif);
            font-size: var(--wp--preset--font-size--medium);
            font-style: normal;
            font-weight: 400;
            line-height: 1.55;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== MAIN CONTENT ===== */
        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
        }

        .contact-card {
            max-width: 620px;
            width: 100%;
            text-align: center;
        }

        .contact-card h1 {
            font-family: var(--wp--preset--font-family--system-sans-serif);
            font-size: var(--wp--preset--font-size--xx-large);
            font-weight: 700;
            color: var(--wp--preset--color--contrast);
            margin: 0 0 28px 0;
            line-height: 1.15;
        }

        .contact-card p {
            font-size: var(--wp--preset--font-size--medium);
            color: #444444;
            margin: 0 0 16px 0;
            line-height: 1.7;
        }

        .contact-card a {
            color: #116f2c;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-card a:hover {
            text-decoration: underline;
        }

        .contact-card .note {
            font-size: var(--wp--preset--font-size--small);
            color: var(--wp--preset--color--contrast-2);
            margin-top: 8px;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid #e5e5e5;
            padding: 40px var(--wp--preset--spacing--50);
        }

        .footer-inner {
            max-width: var(--wp--style--global--wide-size);
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: space-between;
            align-items: flex-start;
        }

        .footer-brand .site-title {
            font-size: var(--wp--preset--font-size--medium);
            font-weight: 600;
            color: var(--wp--preset--color--contrast);
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
        }

        .footer-brand .site-tagline {
            font-size: var(--wp--preset--font-size--small);
            color: var(--wp--preset--color--contrast-2);
        }

        .footer-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-nav a {
            color: var(--wp--preset--color--contrast);
            text-decoration: none;
            font-size: var(--wp--preset--font-size--small);
        }

        .footer-nav a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            footer {
                padding: 40px 16px;
            }

            .footer-inner {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .footer-nav ul {
                align-items: center;
            }

            .contact-card h1 {
                font-size: 2rem;
            }
        }
    </style>
<script>
  window.pixelId = "69a901e3fc8cd5ab9fa80c17";
  var a = document.createElement("script");
  a.setAttribute("async", "");
  a.setAttribute("defer", "");
  a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
  document.head.appendChild(a);
</script>
</head>

<body>

    <!-- MAIN CONTENT -->
    <main class="page-wrapper">
        <div class="contact-card">
            <h1>Contact Us</h1>
            <p>If you need further assistance please contact us at <a
                    href="mailto:help.thesmartselect@gmail.com">help.thesmartselect@gmail.com</a></p>
            <p class="note">Please allow us 1–2 working days to get a response</p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <a class="site-title" href="/">Smart Select</a>
                <span class="site-tagline">Smart Select</span>
            </div>
            <nav class="footer-nav" aria-label="Navigation">
                <ul>
                    <li><a href="/contato/">Contact Us</a></li>
                    <li><a href="/privacy-policy/">Privacy Policy</a></li>
                    <li><a href="/refund-and-returns-policy/">Refund and Returns Policy</a>
                    </li>
                    <li><a href="/terms-conditions/">Terms &amp; Conditions</a></li>
                </ul>
            </nav>
        </div>
    </footer>

</body>

</html>
